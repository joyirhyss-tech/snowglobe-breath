<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Snowglobe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Bodoni+Moda:ital,wght@1,400;1,500&family=Italiana&family=Homemade+Apple&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/roo/roo.css" />
    <style>
      :root { color-scheme: dark; }
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; overscroll-behavior: none; touch-action: none; }
      body { font-family: system-ui, -apple-system, sans-serif; color: #fff; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
      /* Roo's floating button is hidden — Hush triggers Roo from inside the
         Settings panel instead. The modal/toast HTML stays so RooReporter
         can still open the modal via window.RooReporter.open(). */
      #roo-btn { display: none !important; }

      /* AEQ-branded "Send to Roo" button — blue metallic, replaces the
         default Roo send-button styling. Linear gradient with inset
         highlight + outer drop shadow gives the metallic depth. */
      .roo-btn-send {
        background: linear-gradient(135deg, #3b8fd6 0%, #1f6dac 50%, #0d4d80 100%) !important;
        color: #ffffff !important;
        border: 1px solid rgba(255, 255, 255, 0.28) !important;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          inset 0 -1px 0 rgba(0, 0, 0, 0.18),
          0 2px 6px rgba(8, 40, 80, 0.45) !important;
        font-weight: 500 !important;
        letter-spacing: 0.02em !important;
        transition: filter 160ms ease, transform 80ms ease !important;
      }
      .roo-btn-send:hover {
        filter: brightness(1.08);
      }
      .roo-btn-send:active {
        transform: translateY(1px);
        filter: brightness(0.96);
      }
      .roo-btn-send:disabled {
        filter: grayscale(0.4) brightness(0.85);
        cursor: not-allowed !important;
      }

      /* Small AEQ contact + privacy footer inside the Roo modal. */
      .roo-aeq-footer {
        margin: 14px -2px -2px;
        padding: 12px 14px 4px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        font-size: 0.74rem;
        line-height: 1.5;
        color: rgba(40, 40, 50, 0.72);
        font-family: system-ui, -apple-system, sans-serif;
      }
      .roo-aeq-footer strong { color: rgba(20, 20, 30, 0.9); font-weight: 600; }
      .roo-aeq-footer a {
        color: #1f6dac;
        text-decoration: none;
        border-bottom: 1px dotted rgba(31, 109, 172, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Roo Reporter — feedback button, bottom-right. Wired in src/roo.ts -->
    <button id="roo-btn" class="roo-btn" type="button" aria-label="Report to Roo" title="Tell Roo what's up">
      <span class="roo-speech">Report to Roo</span>
      <img src="/roo/roo-btn.png" alt="Roo the kangaroo" class="roo-img" width="40" height="40" />
    </button>
    <div id="roo-modal" class="roo-modal-backdrop" role="dialog" aria-labelledby="roo-title" aria-hidden="true">
      <div class="roo-modal">
        <div class="roo-modal-header">
          <img src="/roo/roo-header.png" alt="" aria-hidden="true" />
          <div class="roo-modal-title">
            <h3 id="roo-title">Tell Roo what's up</h3>
            <p>Bugs, ideas, or content fixes. Roo hops them straight to <strong>TPC | AEQ</strong>.</p>
          </div>
          <button class="roo-modal-close" type="button" aria-label="Close" data-roo-close>&times;</button>
        </div>
        <div class="roo-type-row" role="radiogroup" aria-label="Type of report">
          <button type="button" class="roo-type-btn roo-active" data-roo-type="bug">🐞 Bug</button>
          <button type="button" class="roo-type-btn"            data-roo-type="content">✏️ Content</button>
          <button type="button" class="roo-type-btn"            data-roo-type="idea">💡 Idea</button>
        </div>
        <textarea id="roo-message" class="roo-message" rows="4"
                  placeholder="What happened? What did you expect? (Roo is listening.)"></textarea>
        <div class="roo-actions">
          <button type="button" class="roo-btn-cancel" data-roo-close>Cancel</button>
          <button type="button" class="roo-btn-send"   id="roo-send">Send to Roo</button>
        </div>
        <div class="roo-aeq-footer">
          <strong>TPC | AEQ</strong> &middot; <a href="mailto:info@aidedeq.org">info@aidedeq.org</a><br />
          Your message is anonymous. We capture only the active mode and what you wrote — no name, email, or device info.
        </div>
      </div>
    </div>
    <div id="roo-toast" class="roo-toast" role="status" aria-live="polite"></div>
    <script src="/roo/roo.js"></script>
  </body>
</html>
